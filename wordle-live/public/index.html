<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Wordle Royale — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #14161c;
  --bg-soft: #1c1f28;
  --panel: #20232d;
  --panel-line: rgba(255,255,255,.08);
  --ink: #eef0f3;
  --ink-dim: #9a9ea8;
  --accent: #ff6b4a;
  --accent-soft: #ff9478;
  --gold: #e8b923;
  --green: #5fb155;
  --green-soft: #7bc472;
  --yellow: #c9a227;
  --yellow-soft: #ddc25a;
  --gray-tile: #3a3d46;
  --shadow-lg: 0 24px 60px rgba(0,0,0,.55);
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: radial-gradient(circle at 50% -10%, #21242e 0%, var(--bg) 60%);
  color: var(--ink);
  font-family: var(--font-body);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; }
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }
::selection { background: var(--accent-soft); color: #1a0d08; }

.btn {
  border: none; border-radius: 12px; padding: 13px 20px; font-weight: 700; font-size: 15px;
  letter-spacing: .2px; transition: transform .08s ease, filter .15s ease;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: scale(.97); }
.btn-accent { background: linear-gradient(180deg, var(--accent-soft), var(--accent)); color: #1a0d08; box-shadow: 0 4px 0 #a8431f, 0 8px 18px rgba(255,107,74,.25); }
.btn-accent:hover { filter: brightness(1.06); }
.btn-ghost { background: rgba(255,255,255,.06); color: var(--ink); border: 1px solid rgba(255,255,255,.14); }
.btn-ghost:hover { background: rgba(255,255,255,.1); }
.btn-gold { background: linear-gradient(180deg, #f2cd5c, var(--gold)); color: #2b1f08; box-shadow: 0 4px 0 #9c7912; }
.btn-block { width: 100%; }
.btn-sm { padding: 8px 13px; font-size: 13px; border-radius: 9px; }
.btn:disabled { opacity: .35; pointer-events: none; }

.panel-card {
  background: linear-gradient(160deg, var(--panel) 0%, var(--bg-soft) 100%);
  border-radius: 22px; padding: 26px 20px 22px;
  box-shadow: var(--shadow-lg), inset 0 0 0 1px var(--panel-line);
  position: relative;
}
.brand-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 2.5px; color: var(--accent-soft); text-transform: uppercase; text-align: center; margin-bottom: 6px; }
.brand-title { font-family: var(--font-display); font-weight: 700; font-size: 30px; text-align: center; color: var(--ink); margin: 0 0 4px; }
.brand-sub { text-align: center; color: var(--ink-dim); font-size: 13.5px; margin: 0 0 20px; line-height: 1.5; }
.section-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase; color: var(--accent-soft); margin: 16px 0 9px; display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.12); }

/* ===== Landing ===== */
.landing-wrap { padding: 28px 18px 40px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
.landing-choice { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
.choice-card { background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); border-radius: 14px; padding: 16px; text-align: left; }
.choice-card h3 { margin: 0 0 4px; font-family: var(--font-display); font-size: 18px; color: var(--ink); }
.choice-card p { margin: 0 0 12px; color: var(--ink-dim); font-size: 13px; line-height: 1.4; }

.field { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 9px 11px; }
.field label { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 4px; }
.field input { width: 100%; background: transparent; border: none; color: var(--ink); font-family: var(--font-mono); font-size: 16px; font-weight: 700; padding: 0; }
.field input:focus { outline: none; }
.field input.text-input { font-family: var(--font-body); font-size: 15px; font-weight: 600; text-transform: none; }
.field-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.code-input { text-transform: uppercase; letter-spacing: 4px; font-size: 22px !important; }
.error-msg { color: var(--accent-soft); font-size: 12.5px; text-align: center; margin-top: 10px; min-height: 16px; }
.conn-status { position: fixed; top: 10px; right: 10px; z-index: 80; font-family: var(--font-mono); font-size: 10px; padding: 4px 9px; border-radius: 20px; background: rgba(0,0,0,.4); color: var(--ink-dim); display: flex; align-items: center; gap: 5px; }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.conn-status.ok .conn-dot { background: var(--green); }

/* ===== Lobby ===== */
.lobby-wrap { padding: 24px 18px 40px; flex: 1; }
.room-code-display { text-align: center; margin-bottom: 18px; background: rgba(255,107,74,.08); border: 1.5px dashed rgba(255,107,74,.35); border-radius: 14px; padding: 14px; }
.room-code-label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 2px; color: var(--ink-dim); text-transform: uppercase; }
.room-code-value { font-family: var(--font-display); font-weight: 700; font-size: 38px; color: var(--accent-soft); letter-spacing: 4px; }
.room-code-hint { font-size: 12px; color: var(--ink-dim); margin-top: 4px; }

.seat-row { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,.03); border: 1.5px solid var(--panel-line); border-radius: 14px; padding: 10px 12px; margin-bottom: 8px; }
.seat-row .avatar { width: 34px; height: 34px; min-width: 34px; border-radius: 50%; background: var(--bg-soft); border: 1.5px solid var(--accent); color: var(--accent-soft); font-family: var(--font-display); font-weight: 600; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.seat-row .name { font-weight: 700; font-size: 14.5px; flex: 1; }
.seat-row .you-tag { font-family: var(--font-mono); font-size: 9.5px; color: var(--accent-soft); margin-left: 6px; }
.seat-row .score-tag { font-family: var(--font-mono); font-size: 12px; color: var(--gold); margin-right: 4px; }
.seat-row .conn-pill { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-soft); }
.seat-row .conn-pill.ok { background: var(--green); }
.row-remove { width: 26px; height: 26px; min-width: 26px; border-radius: 50%; border: none; background: rgba(255,107,74,.15); color: var(--accent-soft); font-size: 14px; display: flex; align-items: center; justify-content: center; }
.lobby-actions { display: flex; gap: 8px; margin-top: 14px; }
.lobby-actions .btn { flex: 1; }

/* ===== Race screen ===== */
.race-wrap { height: 100dvh; min-height: 100vh; max-height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
.race-top { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 6px; }
.race-top .room-info { font-family: var(--font-mono); font-size: 11px; color: var(--ink-dim); }
.race-timer { font-family: var(--font-mono); font-weight: 700; font-size: 15px; color: var(--gold); }
.race-timer.urgent { color: var(--accent); }
.icon-btn { width: 32px; height: 32px; border-radius: 9px; border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.04); color: var(--ink-dim); display: flex; align-items: center; justify-content: center; font-size: 14px; }

.board-area { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 6px 12px; }
.board-grid { display: flex; flex-direction: column; gap: 6px; }
.board-row { display: flex; gap: 6px; }
.tile {
  width: 52px; height: 52px; border-radius: 8px; border: 2px solid rgba(255,255,255,.16);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 700; font-size: 24px; color: var(--ink);
  background: rgba(255,255,255,.02); text-transform: uppercase;
  transition: transform .15s ease;
}
.tile.filled { border-color: rgba(255,255,255,.35); }
.tile.green { background: var(--green); border-color: var(--green); color: #0c1a0a; }
.tile.yellow { background: var(--yellow); border-color: var(--yellow); color: #1f1604; }
.tile.gray { background: var(--gray-tile); border-color: var(--gray-tile); color: var(--ink-dim); }
@keyframes tilePop { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
.tile.pop { animation: tilePop .18s ease; }

.keyboard { flex: 0 0 auto; padding: 8px 6px calc(8px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 6px; }
.kb-row { display: flex; gap: 5px; justify-content: center; }
.kb-key {
  flex: 1; max-width: 38px; height: 46px; border-radius: 7px; border: none;
  background: rgba(255,255,255,.08); color: var(--ink); font-weight: 700; font-size: 13px;
  display: flex; align-items: center; justify-content: center; text-transform: uppercase;
  font-family: var(--font-body);
}
.kb-key.wide { max-width: 64px; font-size: 11px; }
.kb-key.green { background: var(--green); color: #0c1a0a; }
.kb-key.yellow { background: var(--yellow); color: #1f1604; }
.kb-key.gray { background: #2a2c33; color: var(--ink-dim); }

.opponents-strip { flex: 0 0 auto; display: flex; gap: 8px; overflow-x: auto; padding: 6px 12px; }
.opp-card { flex: 0 0 auto; background: rgba(255,255,255,.04); border: 1.5px solid var(--panel-line); border-radius: 10px; padding: 6px 8px; min-width: 64px; text-align: center; }
.opp-card.is-finished { border-color: var(--green); }
.opp-name { font-size: 10px; font-weight: 700; color: var(--ink-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }
.opp-pattern-row { display: flex; gap: 2px; justify-content: center; margin-top: 3px; }
.opp-dot { width: 9px; height: 9px; border-radius: 2px; background: #2a2c33; }
.opp-dot.green { background: var(--green); }
.opp-dot.yellow { background: var(--yellow); }
.opp-dot.gray { background: var(--gray-tile); }
.opp-progress { font-family: var(--font-mono); font-size: 10px; color: var(--ink-dim); margin-top: 2px; }

/* ===== Round over ===== */
.roundover-wrap { padding: 20px 16px 30px; flex: 1; overflow-y: auto; }
.answer-reveal { text-align: center; margin-bottom: 16px; }
.answer-label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 2px; color: var(--ink-dim); text-transform: uppercase; }
.answer-word { font-family: var(--font-display); font-weight: 700; font-size: 34px; color: var(--green-soft); text-transform: uppercase; letter-spacing: 2px; }
.results-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
.result-row { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,.04); border-radius: 12px; padding: 9px 13px; border: 1.5px solid var(--panel-line); }
.result-row.is-first { border-color: var(--gold); background: rgba(232,185,35,.08); }
.result-rank { font-family: var(--font-mono); font-weight: 700; color: var(--gold); font-size: 14px; min-width: 22px; }
.result-name { font-weight: 700; flex: 1; font-size: 14px; }
.result-detail { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-dim); }
.result-points { font-family: var(--font-mono); font-weight: 700; color: var(--gold); font-size: 13px; }

/* ===== Log/leaderboard sheet ===== */
.log-panel { position: fixed; inset: 0; z-index: 40; background: rgba(10,8,5,.7); display: flex; align-items: flex-end; }
.log-sheet { max-width: 480px; width: 100%; margin: 0 auto; background: var(--bg-soft); border-radius: 18px 18px 0 0; max-height: 72vh; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); animation: sheetUp .22s ease both; }
@keyframes sheetUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.log-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 8px; }
.log-header h3 { font-family: var(--font-display); margin: 0; font-size: 17px; }
.log-list { overflow-y: auto; padding: 0 16px 18px; display: flex; flex-direction: column; gap: 7px; }

.confirm-modal { position: fixed; inset: 0; z-index: 60; background: rgba(10,8,5,.7); display: flex; align-items: center; justify-content: center; padding: 20px; }
.confirm-card { background: linear-gradient(160deg, var(--panel), var(--bg-soft)); border: 1px solid rgba(255,255,255,.14); border-radius: 16px; padding: 20px; max-width: 320px; text-align: center; box-shadow: var(--shadow-lg); animation: sheetUp .2s ease both; }
.confirm-card p { font-size: 14px; color: var(--ink-dim); margin: 6px 0 16px; }
.confirm-card .action-row { display: flex; gap: 8px; }
.handover-title { font-family: var(--font-display); font-weight: 700; font-size: 20px; color: var(--ink); margin-bottom: 4px; }

.fade-up { animation: fadeUp .3s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.muted { color: var(--ink-dim); }
.action-row { display: flex; gap: 8px; }
.toggle-pair { display: flex; background: rgba(0,0,0,.3); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,.1); }
.toggle-pair button { border: none; background: transparent; color: var(--ink-dim); font-size: 13px; font-weight: 700; font-family: var(--font-body); }
.toggle-pair button.active { background: var(--accent); color: #1a0d08; }

@media (max-width: 360px) {
  .tile { width: 44px; height: 44px; font-size: 20px; }
  .kb-key { height: 42px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  const app = document.getElementById('app');
  const MAX_GUESSES = 6, WORD_LEN = 5;
  const KB_ROWS = [
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l'],
    ['ENTER','z','x','c','v','b','n','m','BACK'],
  ];

  // ===================== STATE =====================
  let ws = null;
  let connStatus = 'connecting';
  let session = loadSession();
  let mySeatIndex = null;
  let pub = null;
  let you = null;
  let landing = { mode: 'choose', name: '', roomCodeInput: '', error: '' };
  let ui = { showLeaderboard: false, confirmLeave: false, currentGuess: '', shakeRow: -1, joinPending: false };

  function loadSession() {
    try { return JSON.parse(localStorage.getItem('wr_session') || 'null'); } catch (e) { return null; }
  }
  function saveSession(s) { session = s; try { localStorage.setItem('wr_session', JSON.stringify(s)); } catch (e) {} }
  function clearSession() { session = null; try { localStorage.removeItem('wr_session'); } catch (e) {} }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  function avatarInitial(name) { const t = (name || '').trim(); return t ? t.charAt(0).toUpperCase() : '?'; }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  // ===================== WEBSOCKET =====================
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => {
      connStatus = 'connected';
      if (session && session.roomCode && session.token) {
        send({ type: 'join_room', roomCode: session.roomCode, token: session.token, name: session.name });
      }
      render();
    };
    ws.onclose = () => { connStatus = 'disconnected'; render(); setTimeout(connect, 1500 + Math.random() * 1000); };
    ws.onerror = () => {};
    ws.onmessage = (ev) => {
      let msg; try { msg = JSON.parse(ev.data); } catch (e) { return; }
      handleServerMessage(msg);
    };
  }
  function send(obj) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj)); }

  function handleServerMessage(msg) {
    if (msg.type === 'joined') {
      mySeatIndex = msg.seatIndex;
      saveSession({ roomCode: msg.roomCode, token: msg.token, name: session ? session.name : landing.name });
      landing.error = ''; ui.joinPending = false;
      render();
    } else if (msg.type === 'error') {
      ui.joinPending = false;
      if (!session) { landing.error = msg.message; render(); }
      else {
        landing.error = "Lost the connection to your game (the server likely restarted) — sorry about that. Start a new one below.";
        if (!pub) { clearSession(); render(); }
      }
    } else if (msg.type === 'state') {
      const prevPhase = pub ? pub.phase : null;
      pub = msg;
      if (prevPhase !== 'racing' && pub.phase === 'racing') ui.currentGuess = '';
      render();
    } else if (msg.type === 'you') {
      you = msg;
      render();
    }
  }

  // ===================== RENDER DISPATCH =====================
  function render() {
    if (!pub) { app.innerHTML = renderLanding() + renderConnStatus(); return; }
    if (pub.phase === 'lobby') { app.innerHTML = renderLobby() + renderConnStatus(); return; }
    if (pub.phase === 'racing' || pub.phase === 'round-over') {
      app.innerHTML = renderRace() + renderConnStatus();
      tickTimer();
      return;
    }
  }

  function renderConnStatus() {
    const ok = connStatus === 'connected';
    return `<div class="conn-status ${ok ? 'ok' : ''}"><span class="conn-dot"></span>${ok ? 'Live' : 'Reconnecting…'}</div>`;
  }

  // ===================== LANDING =====================
  function renderLanding() {
    if (landing.mode === 'create') return renderLandingForm('create');
    if (landing.mode === 'join') return renderLandingForm('join');
    return `
    <div class="landing-wrap">
      <div class="panel-card fade-up">
        <div class="brand-eyebrow">5 Letters · Live Race</div>
        <h1 class="brand-title">Wordle Royale</h1>
        <p class="brand-sub">Same word, same moment, whoever solves it first wins. Everyone races live on their own phone.</p>
        <div class="landing-choice">
          <div class="choice-card">
            <h3>Start a new race</h3>
            <p>You'll get a 4-letter room code to send to everyone.</p>
            <button class="btn btn-accent btn-block" data-action="goto-create">Create a Room</button>
          </div>
          <div class="choice-card">
            <h3>Join a race</h3>
            <p>Got a code from someone? Hop in here.</p>
            <button class="btn btn-ghost btn-block" data-action="goto-join">Join a Room</button>
          </div>
        </div>
        <div class="error-msg">${escapeHtml(landing.error)}</div>
      </div>
    </div>`;
  }

  function renderLandingForm(mode) {
    const isCreate = mode === 'create';
    return `
    <div class="landing-wrap">
      <div class="panel-card fade-up">
        <div class="brand-eyebrow">${isCreate ? 'New Room' : 'Join Room'}</div>
        <h1 class="brand-title">${isCreate ? "Let's set up" : 'Find your seat'}</h1>
        <div class="field-row">
          <div class="field"><label>Your Name</label><input type="text" class="text-input" placeholder="e.g. Sam" value="${escapeHtml(landing.name)}" data-bind="landing-name" maxlength="18"></div>
          ${!isCreate ? `<div class="field"><label>Room Code</label><input type="text" class="text-input code-input" placeholder="ABCD" value="${escapeHtml(landing.roomCodeInput)}" data-bind="landing-code" maxlength="4"></div>` : ''}
        </div>
        ${!isCreate ? `<p style="font-size:11.5px;color:var(--ink-dim);margin:0 0 8px;">Got booted mid-race? Type the exact same name you used before to jump back in.</p>` : ''}
        <div class="error-msg">${escapeHtml(landing.error)}</div>
        <div class="action-row">
          <button class="btn btn-ghost" data-action="goto-choose">Back</button>
          <button class="btn btn-accent" data-action="${isCreate ? 'submit-create' : 'submit-join'}" ${ui.joinPending ? 'disabled' : ''}>${isCreate ? 'Create Room' : 'Join Room'}</button>
        </div>
      </div>
    </div>`;
  }

  // ===================== LOBBY =====================
  function renderLobby() {
    const players = pub.players;
    return `
    <div class="lobby-wrap">
      <div class="panel-card fade-up">
        <div class="brand-eyebrow">Lobby</div>
        <div class="room-code-display">
          <div class="room-code-label">Room Code — share this</div>
          <div class="room-code-value">${escapeHtml(pub.roomCode)}</div>
          <div class="room-code-hint">Everyone opens this site &amp; joins with this code</div>
        </div>

        <div class="section-label">Players (${players.length}/12)</div>
        ${players.map(p => renderLobbySeat(p)).join('')}

        <div class="section-label">Round Settings</div>
        <div class="field-row" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div class="field">
            <label>Round Time Limit</label>
            <div style="display:flex;align-items:baseline;gap:6px;">
              <input type="number" min="1" max="15" step="1" value="${pub.settings.roundMinutes}" data-bind="settings-roundminutes" style="width:auto;flex:1;">
              <span style="font-family:var(--font-mono);font-size:12px;color:var(--ink-dim);">min</span>
            </div>
          </div>
          <div class="field">
            <label>Total Rounds</label>
            <input type="number" min="1" max="20" step="1" value="${pub.settings.totalRounds}" data-bind="settings-totalrounds">
          </div>
        </div>

        <div class="lobby-actions">
          <button class="btn btn-ghost" data-action="leave-table">Leave</button>
          <button class="btn btn-accent" data-action="start-round">${pub.roundNumber > 0 ? 'Start Next Round' : 'Start Race'}</button>
        </div>
      </div>
    </div>`;
  }

  function renderLobbySeat(p) {
    const isMe = p.seatIndex === mySeatIndex;
    return `<div class="seat-row">
      <div class="avatar">${avatarInitial(p.name)}</div>
      <div class="name">${escapeHtml(p.name)}${isMe ? '<span class="you-tag">YOU</span>' : ''}</div>
      ${p.score ? `<span class="score-tag">${p.score} pts</span>` : ''}
      <div class="conn-pill ${p.connected ? 'ok' : ''}"></div>
      <button class="row-remove" data-action="remove-player" data-seat="${p.seatIndex}">✕</button>
    </div>`;
  }

  // ===================== RACE / ROUND-OVER =====================
  function renderRace() {
    const parts = [];
    parts.push(renderRaceTop());
    if (pub.phase === 'round-over') {
      parts.push(renderRoundOver());
    } else {
      parts.push(renderBoardArea());
      parts.push(renderOpponentsStrip());
      parts.push(renderKeyboard());
    }
    if (ui.showLeaderboard) parts.push(renderLeaderboardSheet());
    if (ui.confirmLeave) parts.push(renderConfirmLeave());
    return `<div class="race-wrap">${parts.join('')}</div>`;
  }

  function renderRaceTop() {
    return `<div class="race-top">
      <div class="room-info">Room ${escapeHtml(pub.roomCode)} · Round ${pub.roundNumber} of ${pub.settings.totalRounds}</div>
      ${pub.phase === 'racing' ? `<div class="race-timer" id="raceTimer">--:--</div>` : `<div></div>`}
      <div style="display:flex;gap:6px;">
        <button class="icon-btn" data-action="toggle-leaderboard" title="Leaderboard">🏆</button>
        <button class="icon-btn" data-action="ask-leave" title="Leave">✕</button>
      </div>
    </div>`;
  }

  function tileClass(result) {
    if (result === 'green') return 'green';
    if (result === 'yellow') return 'yellow';
    if (result === 'gray') return 'gray';
    return '';
  }

  function renderBoardArea() {
    const guesses = (you && you.guesses) || [];
    const rows = [];
    for (let r = 0; r < MAX_GUESSES; r++) {
      if (r < guesses.length) {
        const g = guesses[r];
        rows.push(`<div class="board-row">${g.guess.split('').map((ch, i) => `<div class="tile filled ${tileClass(g.result[i])}">${ch}</div>`).join('')}</div>`);
      } else if (r === guesses.length && you && you.canGuess) {
        const letters = ui.currentGuess.split('');
        const cells = [];
        for (let i = 0; i < WORD_LEN; i++) cells.push(`<div class="tile ${letters[i] ? 'filled' : ''}">${letters[i] || ''}</div>`);
        rows.push(`<div class="board-row ${ui.shakeRow === r ? 'shake' : ''}">${cells.join('')}</div>`);
      } else {
        rows.push(`<div class="board-row">${'<div class="tile"></div>'.repeat(WORD_LEN)}</div>`);
      }
    }
    let statusLine = '';
    if (you && you.finished) {
      statusLine = you.solved
        ? `<div class="muted" style="text-align:center;font-size:13px;margin-top:8px;">Solved! Waiting on everyone else…</div>`
        : `<div class="muted" style="text-align:center;font-size:13px;margin-top:8px;">Out of guesses — waiting on everyone else…</div>`;
    }
    return `<div class="board-area"><div class="board-grid">${rows.join('')}</div>${statusLine}</div>`;
  }

  function letterStatuses() {
    const statuses = {};
    const guesses = (you && you.guesses) || [];
    const rank = { gray: 0, yellow: 1, green: 2 };
    for (const g of guesses) {
      for (let i = 0; i < g.guess.length; i++) {
        const ch = g.guess[i], res = g.result[i];
        if (!statuses[ch] || rank[res] > rank[statuses[ch]]) statuses[ch] = res;
      }
    }
    return statuses;
  }

  function renderKeyboard() {
    const canType = !!(you && you.canGuess);
    const statuses = letterStatuses();
    return `<div class="keyboard">
      ${KB_ROWS.map(row => `<div class="kb-row">${row.map(k => {
        if (k === 'ENTER') return `<button class="kb-key wide" data-action="kb-enter" ${canType ? '' : 'disabled'}>Enter</button>`;
        if (k === 'BACK') return `<button class="kb-key wide" data-action="kb-back" ${canType ? '' : 'disabled'}>⌫</button>`;
        const st = statuses[k] || '';
        return `<button class="kb-key ${st}" data-action="kb-letter" data-letter="${k}" ${canType ? '' : 'disabled'}>${k}</button>`;
      }).join('')}</div>`).join('')}
    </div>`;
  }

  function renderOpponentsStrip() {
    const others = pub.players.filter(p => p.seatIndex !== mySeatIndex);
    if (!others.length) return '';
    return `<div class="opponents-strip">${others.map(p => {
      const patterns = p.patterns || [];
      const dotsRows = patterns.map(pat => `<div class="opp-pattern-row">${pat.map(r => `<div class="opp-dot ${r}"></div>`).join('')}</div>`).join('');
      return `<div class="opp-card ${p.finished ? 'is-finished' : ''}">
        <div class="opp-name">${escapeHtml(p.name)}</div>
        ${dotsRows}
        <div class="opp-progress">${p.finished ? (p.solved ? '✓ solved' : '✗ out') : `${p.guessCount}/${MAX_GUESSES}`}</div>
      </div>`;
    }).join('')}</div>`;
  }

  function tickTimer() {
    const el = document.getElementById('raceTimer');
    if (!el || !pub || !pub.roundDeadline) return;
    const remainingMs = Math.max(0, pub.roundDeadline - Date.now());
    const mins = Math.floor(remainingMs / 60000);
    const secs = Math.floor((remainingMs % 60000) / 1000);
    el.textContent = mins + ':' + String(secs).padStart(2, '0');
    el.classList.toggle('urgent', remainingMs <= 30000);
  }

  function renderRoundOver() {
    if (pub.gameOver) return renderGameSummary();
    const results = pub.lastRoundResults || [];
    return `<div class="roundover-wrap fade-up">
      <div class="answer-reveal">
        <div class="answer-label">The Word Was</div>
        <div class="answer-word">${escapeHtml(pub.answer || '')}</div>
      </div>
      <div class="results-list">
        ${results.map((r, i) => `<div class="result-row ${i === 0 && r.solved ? 'is-first' : ''}">
          <div class="result-rank">${i === 0 && r.solved ? '🏆' : '#' + (i + 1)}</div>
          <div class="result-name">${escapeHtml(r.name)}${r.seatIndex === mySeatIndex ? ' (you)' : ''}</div>
          <div class="result-detail">${r.solved ? `${r.guessCount}/${MAX_GUESSES} · ${(r.timeMs / 1000).toFixed(1)}s` : 'DNF'}</div>
          <div class="result-points">+${r.points}</div>
        </div>`).join('')}
      </div>
      <button class="btn btn-accent btn-block" data-action="start-round">Start Next Round</button>
      <button class="btn btn-ghost btn-block" style="margin-top:8px;" data-action="ask-leave">Leave Room</button>
    </div>`;
  }

  function renderGameSummary() {
    const standings = pub.finalStandings || [];
    const winner = standings[0];
    return `<div class="roundover-wrap fade-up">
      <div class="answer-reveal">
        <div style="font-size:46px;">🏆</div>
        <div class="answer-label" style="margin-top:6px;">Game Over · ${pub.settings.totalRounds} Rounds</div>
        <div class="answer-word" style="font-size:26px;color:var(--gold);">${winner ? escapeHtml(winner.name) : ''} Wins!</div>
      </div>
      <div class="results-list">
        ${standings.map((r, i) => `<div class="result-row ${i === 0 ? 'is-first' : ''}">
          <div class="result-rank">${i === 0 ? '🏆' : '#' + (i + 1)}</div>
          <div class="result-name">${escapeHtml(r.name)}${r.seatIndex === mySeatIndex ? ' (you)' : ''}</div>
          <div class="result-detail">${r.totalGuesses} guesses · ${(r.totalTimeMs / 1000).toFixed(0)}s total</div>
          <div class="result-points">${r.score} pts</div>
        </div>`).join('')}
      </div>
      <button class="btn btn-accent btn-block" data-action="new-game">Play Again</button>
      <button class="btn btn-ghost btn-block" style="margin-top:8px;" data-action="ask-leave">Leave Room</button>
    </div>`;
  }

  function renderLeaderboardSheet() {
    const sorted = pub.players.slice().sort((a, b) => (b.score || 0) - (a.score || 0));
    return `<div class="log-panel">
      <div class="log-sheet">
        <div class="log-header"><h3>🏆 Leaderboard</h3><button class="icon-btn" data-action="toggle-leaderboard">✕</button></div>
        <div class="log-list">${sorted.map((p, i) => `<div class="result-row ${i === 0 ? 'is-first' : ''}">
          <div class="result-rank">#${i + 1}</div>
          <div class="result-name">${escapeHtml(p.name)}${p.seatIndex === mySeatIndex ? ' (you)' : ''}</div>
          <div class="result-points">${p.score || 0} pts</div>
        </div>`).join('')}</div>
      </div>
    </div>`;
  }

  function renderConfirmLeave() {
    return `<div class="confirm-modal">
      <div class="confirm-card">
        <div class="handover-title">Leave the room?</div>
        <p>You can rejoin with the same room code if you change your mind.</p>
        <div class="action-row">
          <button class="btn btn-ghost" data-action="cancel-leave">Stay</button>
          <button class="btn btn-accent" data-action="confirm-leave">Leave</button>
        </div>
      </div>
    </div>`;
  }

  // ===================== ACTIONS =====================
  function doLeaveTable() {
    send({ type: 'leave_room' });
    clearSession();
    pub = null; you = null; mySeatIndex = null;
    landing = { mode: 'choose', name: '', roomCodeInput: '', error: '' };
    ui.confirmLeave = false;
    render();
  }

  function typeLetter(ch) {
    if (!you || !you.canGuess) return;
    if (ui.currentGuess.length >= WORD_LEN) return;
    ui.currentGuess += ch;
    render();
  }
  function backspace() {
    ui.currentGuess = ui.currentGuess.slice(0, -1);
    render();
  }
  function submitGuess() {
    if (!you || !you.canGuess) return;
    if (ui.currentGuess.length !== WORD_LEN) return;
    send({ type: 'submit_guess', guess: ui.currentGuess });
    ui.currentGuess = '';
  }

  function onAppClick(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    const action = target.dataset.action;
    switch (action) {
      case 'goto-create': landing.mode = 'create'; landing.error = ''; render(); break;
      case 'goto-join': landing.mode = 'join'; landing.error = ''; render(); break;
      case 'goto-choose': landing.mode = 'choose'; landing.error = ''; render(); break;
      case 'submit-create':
        if (!landing.name.trim()) { landing.error = 'Enter your name first.'; render(); return; }
        ui.joinPending = true;
        send({ type: 'create_room', name: landing.name });
        break;
      case 'submit-join':
        if (!landing.name.trim()) { landing.error = 'Enter your name first.'; render(); return; }
        if (!landing.roomCodeInput.trim()) { landing.error = 'Enter the room code.'; render(); return; }
        ui.joinPending = true;
        send({ type: 'join_room', roomCode: landing.roomCodeInput.trim().toUpperCase(), name: landing.name });
        break;

      case 'remove-player': send({ type: 'remove_player', seatIndex: Number(target.dataset.seat) }); break;
      case 'start-round': send({ type: 'start_round' }); break;
      case 'new-game': send({ type: 'new_game' }); break;

      case 'kb-letter': typeLetter(target.dataset.letter); break;
      case 'kb-back': backspace(); break;
      case 'kb-enter': submitGuess(); break;

      case 'toggle-leaderboard': ui.showLeaderboard = !ui.showLeaderboard; render(); break;
      case 'ask-leave': ui.confirmLeave = true; render(); break;
      case 'cancel-leave': ui.confirmLeave = false; render(); break;
      case 'confirm-leave': doLeaveTable(); break;
      case 'leave-table': doLeaveTable(); break;
    }
  }

  function onAppInput(e) {
    const el = e.target;
    const bind = el.dataset && el.dataset.bind;
    if (!bind) return;
    if (bind === 'landing-name') landing.name = el.value;
    else if (bind === 'landing-code') landing.roomCodeInput = el.value.toUpperCase();
    else if (bind === 'settings-roundminutes') send({ type: 'update_settings', settings: { roundMinutes: Number(el.value) } });
    else if (bind === 'settings-totalrounds') send({ type: 'update_settings', settings: { totalRounds: Number(el.value) } });
  }

  function onKeyDown(e) {
    if (!pub || pub.phase !== 'racing' || !you || !you.canGuess) return;
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    const k = e.key.toLowerCase();
    if (k === 'enter') { submitGuess(); }
    else if (k === 'backspace') { backspace(); }
    else if (/^[a-z]$/.test(k)) { typeLetter(k); }
  }

  app.addEventListener('click', onAppClick);
  app.addEventListener('input', onAppInput);
  document.addEventListener('keydown', onKeyDown);

  setInterval(() => send({ type: 'ping' }), 25000);
  setInterval(tickTimer, 500);

  render();
  connect();
})();
</script>
</body>
</html>
